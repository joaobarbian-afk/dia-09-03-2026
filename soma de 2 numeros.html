<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Soma de dois números</h2>

    <input type="number" id="soma1" placeholder="Número 1">
    <input type="number" id="soma2" placeholder="Número 2">

    <button onclick="somar()">Somar</button>

    <p id="resultadoSoma"></p>

    <script>
     function somar() {
            let n1 = Number(document.getElementById("soma1").value);
            let n2 = Number(document.getElementById("soma2").value);

            let resultado = n1 + n2;

            document.getElementById("resultadoSoma").textContent = "Resultado: " + resultado;
        }
    </script>
</body>

</html>
