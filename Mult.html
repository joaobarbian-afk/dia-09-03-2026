<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Multiplicação</h2>

    <input type="number" id="mult1" placeholder="Número 1">

    <input type="number" id="mult2" placeholder="Número 2">

    <button onclick="multiplicar()">Multiplicar</button>
    <p id="resultadoMult"></p>

    <script>

        function multiplicar() {
            let n1 = Number(document.getElementById("mult1").value);
            let n2 = Number(document.getElementById("mult2").value);

            let resultado = n1 * n2;

            document.getElementById("resultadoMult").textContent = "Resultado: " + resultado;
        }
    </script>
</body>

</html>
