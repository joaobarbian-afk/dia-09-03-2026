<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
      <h2>1 - Mostrar mensagem</h2>

    <button onclick="mostrarMensagem()">Clique aqui</button>

    <p id="mensagem"></p>

    <script>

        function mostrarMensagem() {
            document.getElementById("mensagem").textContent = "Olá, seja bem-vindo!";
        }
    </script>
</body>
</html>
